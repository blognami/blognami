name: CI

on: 
  push:
  workflow_dispatch:
    inputs:
      deploy_site:
        description: 'Deploy pinstripejs.com to GitHub Pages'
        required: false
        default: 'true'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
    strategy:
      matrix:
        node: [18.x, 20.x]
        database-adapter: [mysql, sqlite]
        modules:
          - '@blognami/pages, @blognami/posts, @blognami/tags'
          - '@pinstripe/multi-tenant, @blognami/pages, @blognami/posts, @blognami/tags'
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - run: npm install
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - run: DATABASE_ADAPTER=${{ matrix.database-adapter }} MODULES="${{ matrix.modules }}" npm run test
        env:
          CI: true
      - name: Archive Playwright HTML report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.node }}-${{ matrix.database-adapter }}
          path: packages/demo/playwright-report/
          retention-days: 30
      - name: Archive Playwright test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results-${{ matrix.node }}-${{ matrix.database-adapter }}
          path: packages/demo/test-results/
          retention-days: 30

  deploy-pinstripejs-com:
    name: Deploy pinstripejs.com to GitHub Pages
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.deploy_site == 'true'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
      - run: npm install
      - name: Build pinstripejs.com
        run: npm run build
        working-directory: packages/pinstripejs.com
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: packages/pinstripejs.com/build/static
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4


